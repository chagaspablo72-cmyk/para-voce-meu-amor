<!DOCTYPE html>
<html>
<head>
  <title>Pra você 💖</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      text-align: center;
      font-family: Arial, "Segoe UI Emoji", "Apple Color Emoji", sans-serif;

      background: linear-gradient(-45deg, #ff9ecb, #ffc1e3, #ffd6f0, #ffe6f0);
      background-size: 400% 400%;
      animation: gradientBG 10s ease infinite;

      margin: 0;
      padding: 20px;
      overflow-y: auto;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      color: #ff4d6d;
      font-size: 8vw;
      animation: tituloAnimado 2s infinite;
      margin-top: 20px;
    }

    @keyframes tituloAnimado {
      0% { transform: scale(1); text-shadow: 0 0 5px #ff4d6d; }
      50% { transform: scale(1.1); text-shadow: 0 0 20px #ff85a2; }
      100% { transform: scale(1); text-shadow: 0 0 5px #ff4d6d; }
    }

    p {
      font-size: 4.5vw;
      color: #333;
      white-space: pre-line;
      margin: 15px 0;
    }

    button {
      padding: 12px 20px;
      font-size: 4.5vw;
      background-color: #ff4d6d;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 20px;
    }

    .heart {
      font-size: 8vw;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    #mensagem {
      display: none;
      margin-top: 20px;
    }

    .falling-heart {
      position: fixed;
      top: -10px;
      font-size: 5vw;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh);
        opacity: 0;
      }
    }
  </style>

  <script>
    let texto = `Queria te falar o quanto você é importante pra mim, mesmo com toda essa distância,
conversar com você virou uma das melhores coisas que eu tenho 💕\n\n

Eu gosto muito da gente, do nosso jeito, do carinho que a gente tem um com o outro  
Mesmo sem a gente ter oficializado nada ainda, mas isso está sendo muito especial
pra mim ❤️\n\n

Eu sei que a gente nunca se viu “pessoalmente”, mas todo dia dá vontade de te ter aqui perto de mim, de poder te abraçar e viver momentos simples com você\n\n

Mas mesmo assim, eu continuo aqui, porque você vale muito a pena, meu amor.🤍\n\n

Você me faz muito bem, me faz sorrir, me faz sentir algo que é difícil de explicar, minha vida... só sei que é muito bom 🥰  
E eu quero continuar vivendo isso com você, cada dia mais. \n\n

Eu te amo muito ❤️`;

    let i = 0;

    function iniciar() {
      document.getElementById("mensagem").style.display = "block";

      let musica = document.getElementById("musica");
      musica.volume = 0.3;

      // 🔥 espera carregar e começa nos 27s
      musica.addEventListener("loadedmetadata", function () {
        musica.currentTime = 27;
        musica.play();
      });

      // caso já esteja carregado
      if (musica.readyState >= 1) {
        musica.currentTime = 27;
        musica.play();
      }

      digitarTexto();
    }

    function digitarTexto() {
      if (i < texto.length) {
        document.getElementById("textoDigitando").innerHTML += texto.charAt(i);
        i++;

        window.scrollTo({
          top: document.body.scrollHeight,
          behavior: "smooth"
        });

        setTimeout(digitarTexto, 30);
      }
    }

    function criarCoracao() {
      const heart = document.createElement("div");
      heart.classList.add("falling-heart");
      heart.innerText = "💖";

      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (Math.random() * 3 + 2) + "s";

      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 5000);
    }

    setInterval(criarCoracao, 400);
  </script>

</head>

<body>

  <!-- 🎵 MÚSICA -->
  <audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

  <h1>Nadylla💖</h1>

  <p>
    Eu fiz isso pra você meu amor... 🥺 <br><br>
    Mesmo de longe, você tá sempre comigo... 💖
  </p>

  <button onclick="iniciar()">Clique aqui 💌</button>

  <div id="mensagem">
    <p id="textoDigitando"></p>
    <div class="heart">💖</div>
  </div>

</body>
</html>
